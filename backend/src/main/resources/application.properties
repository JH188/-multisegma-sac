# ===================== DATASOURCE MYSQL RAILWAY =====================
server.port=${PORT:8080}

spring.datasource.url=jdbc:mysql://${MYSQLHOST}:${MYSQLPORT}/${MYSQL_DATABASE}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=${MYSQLUSER}
spring.datasource.password=${MYSQL_ROOT_PASSWORD}

# ===================== JPA / HIBERNATE =====================
spring.jpa.hibernate.ddl-auto=update
spring.sql.init.mode=never
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.jdbc.time_zone=America/Lima

# ===================== ERRORES BACKEND =====================
server.error.include-message=always
server.error.include-binding-errors=always
server.error.include-stacktrace=always

# ==============================
# CONFIGURACIÓN DE CORREO
# ==============================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ==============================
# BREVO EMAIL API
# ==============================
brevo.api.key=${BREVO_API_KEY}
app.mail.from=${MAIL_FROM}
app.mail.from-name=${MAIL_FROM_NAME:MULTISEGMA S.A.C.}