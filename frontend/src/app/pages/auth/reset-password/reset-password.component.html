<section class="reset-page">
  <div class="reset-card">
    <span class="tag">MULTISEGMA S.A.C.</span>

    <h1>Restablecer contraseña</h1>

    <p *ngIf="step === 1">
      Ingresa tu correo registrado y te enviaremos un código de recuperación.
    </p>

    <p *ngIf="step === 2">
      Ingresa el código que llegó a tu correo y crea una nueva contraseña.
    </p>

    <!-- PASO 1: ENVIAR CÓDIGO -->
    <form *ngIf="step === 1" (ngSubmit)="sendCode()">
      <label>Correo electrónico</label>
      <input
        type="email"
        name="email"
        [(ngModel)]="email"
        placeholder="cliente@correo.com"
      />

      <div class="error" *ngIf="error">
        {{ error }}
      </div>

      <div class="success" *ngIf="success">
        {{ success }}
      </div>

      <button type="submit" [disabled]="loading">
        {{ loading ? 'Enviando código...' : 'Enviar código de recuperación' }}
      </button>
    </form>

    <!-- PASO 2: VALIDAR CÓDIGO Y CAMBIAR CONTRASEÑA -->
    <form *ngIf="step === 2" (ngSubmit)="resetPassword()">
      <label>Correo electrónico</label>
      <input
        type="email"
        name="emailStep2"
        [(ngModel)]="email"
        readonly
        class="readonly-input"
      />

      <label>Código de recuperación</label>
      <input
        type="text"
        name="code"
        [(ngModel)]="code"
        placeholder="Ejemplo: 123456"
        maxlength="6"
      />

      <label>Nueva contraseña</label>
      <input
        type="password"
        name="newPassword"
        [(ngModel)]="newPassword"
        placeholder="Mínimo 6 caracteres"
      />

      <label>Confirmar contraseña</label>
      <input
        type="password"
        name="confirmPassword"
        [(ngModel)]="confirmPassword"
        placeholder="Repite tu contraseña"
      />

      <div class="error" *ngIf="error">
        {{ error }}
      </div>

      <div class="success" *ngIf="success">
        {{ success }}
      </div>

      <button type="submit" [disabled]="loading">
        {{ loading ? 'Actualizando...' : 'Actualizar contraseña' }}
      </button>

      <button
        type="button"
        class="btn-secondary"
        (click)="backToEmail()"
        [disabled]="loading"
      >
        Cambiar correo
      </button>
    </form>

    <a routerLink="/auth" class="back-login">
      ← Volver al inicio de sesión
    </a>
  </div>
</section>
